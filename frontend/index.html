<!DOCTYPE html>
<html>
<head>
  <title>Razorpay Checkout</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="text-align:center; margin-top:50px; font-family:Arial">

<h2>Place Order</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>

<button onclick="payNow()">Pay Now</button>

<script>
async function payNow() {

  const amount = Number(document.getElementById("amount").value);
  
##your ngrok url
  const response = await fetch("ngrokurl/create-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  const order = await response.json();

  var options = {
    key: "rzp_test_SMGZwqflQ2Rizy",
    amount: order.amount,
    currency: "INR",
    order_id: order.id,
    handler: async function (response) {

      await fetch("https://proudly-supermorose-diane.ngrok-free.dev/verify-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(response)
      });

      alert("Payment Successful!");
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}
</script>

</body>
</html>
